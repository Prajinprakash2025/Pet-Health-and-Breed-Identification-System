<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>PetCare AI - Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light sticky-top py-3">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'home' %}">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                 class="bi bi-heart-fill text-primary" viewBox="0 0 16 16">
                <path fill-rule="evenodd"
                      d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314z"/>
            </svg>
            <span>PetCare AI Admin</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <a href="{% url 'analytics:ml_admin_dashboard' %}" class="nav-link small text-uppercase fw-semibold">
                ML Dashboard
            </a>
            <a href="{% url 'accounts:profile' %}" class="nav-link small">Back to user view</a>
            <a href="{% url 'accounts:logout' %}" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<main class="container-fluid" style="padding-top: 2rem; padding-bottom: 3rem;">
    {% if messages %}
        <div class="row justify-content-center mb-3">
            <div class="col-xl-8 col-lg-10">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm border-0" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-7 col-lg-5">
        <div class="bg-white rounded-4 shadow-sm p-4 p-lg-5">
            <h1 class="fw-bold mb-2">Reset your password</h1>
            <p class="text-muted">Enter your registered email address and we will send a reset link.</p>
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form.non_field_errors }}
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-uppercase" for="{{ form.email.id_for_label }}">Email</label>
                    {{ form.email }}
                    {% for error in form.email.errors %}
                        <div class="text-danger small mt-1">{{ error }}</div>
                    {% endfor %}
                </div>
                <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'accounts:login' %}" class="auth-link small">Back to login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

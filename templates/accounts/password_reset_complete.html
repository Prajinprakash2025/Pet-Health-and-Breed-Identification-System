{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-lg-8 col-xl-7">
        <div class="auth-card bg-white rounded-4 shadow-lg p-4 p-lg-5 text-center">
            <div class="reset-success-icon mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM6.97 10.97l5.48-5.48-.94-.94-4.54 4.54-2.02-2.02-.94.94 2.96 2.96z"/>
                </svg>
            </div>
            <span class="text-muted small text-uppercase fw-semibold tracking-wide">Complete</span>
            <h1 class="h2 fw-bold mt-1 mb-2">Password updated</h1>
            <p class="text-muted mb-4">You can now sign in with your new password.</p>
            <a href="{% url 'accounts:login' %}" class="btn btn-primary px-5">Login</a>
        </div>
    </div>
</div>
{% endblock %}
